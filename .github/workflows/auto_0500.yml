name: Auto Fetch 0050 Price

on:
  schedule:
    - cron: '30 6 * * 1-5' # Runs at 06:30, Monday through Friday
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 檢查儲存庫代碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝相關套件
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas openpyxl

      - name: 執行 Python 腳本
        run: python get_0050.py

      - name: 自動將更新後的 Excel 檔案存回儲存庫
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 0050_history.xlsx
          git commit -m "自動更新 Excel 價格紀錄 [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
